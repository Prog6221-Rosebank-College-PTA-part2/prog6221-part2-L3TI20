name: .NET Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - run: dotnet restore CyberSecurityBotPart2.csproj
    - run: dotnet build CyberSecurityBotPart2.csproj --configuration Debug --no-restore
    - run: dotnet build CyberSecurityBotPart2.csproj --configuration Release --no-restore
    - run: echo "Both builds passed."
